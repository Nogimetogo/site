<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Nogime togo</title>
    <meta name="description" content="Nogime togo contact form.">
    <link rel="stylesheet" href="./styles.css?v=20260519-googleform">
  </head>
  <body class="contact-page">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="./index.html#top" aria-label="Nogime togo home">Nogime togo</a>
        <p class="brand-tagline">Draw | Build | Place<br>Works in Architecture &amp; Photography</p>
      </div>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav">MENU</button>
      <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
        <a href="./index.html#gallery">PICK UP</a>
        <a href="./index.html#profile">PROFILE</a>
        <a href="./index.html#news">NEWS</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </header>

    <main>
      <section class="section contact-form-section">
        <div class="section-heading">
          <h1>CONTACT</h1>
        </div>
        <div class="google-form-frame">
          <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfXRR-Vg8r_nlWYwngZN1SAe3pnCIyet5YVg3N31ezfEzsHuw/viewform?embedded=true" width="640" height="661" frameborder="0" marginheight="0" marginwidth="0">Loading...</iframe>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <small data-copyright-year="2026">Copyright 2026 Nogime togo</small>
    </footer>

    <script>
      const primaryNav = document.querySelector(".primary-nav");
      const menuButton = document.querySelector(".menu-button");

      menuButton.addEventListener("click", () => {
        const open = !primaryNav.classList.contains("is-open");
        primaryNav.classList.toggle("is-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
      });
    </script>
  </body>
</html>
