<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Nogime togo</title>
    <meta name="description" content="Nogime togo contact form.">
    <link rel="stylesheet" href="./styles.css?v=20260519-customform">
  </head>
  <body class="contact-page">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="./index.html#top" aria-label="Nogime togo home">Nogime togo</a>
        <p class="brand-tagline">Draw | Build | Place<br>Works in Architecture &amp; Photography</p>
      </div>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav">MENU</button>
      <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
        <a href="./index.html#gallery">PICK UP</a>
        <a href="./index.html#profile">PROFILE</a>
        <a href="./index.html#news">NEWS</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </header>

    <main>
      <section class="section contact-form-section">
        <div class="section-heading">
          <h1>CONTACT</h1>
        </div>
        <form
          class="contact-form site-contact-form"
          id="contactForm"
          action="https://docs.google.com/forms/d/e/1FAIpQLSfXRR-Vg8r_nlWYwngZN1SAe3pnCIyet5YVg3N31ezfEzsHuw/formResponse"
          method="POST"
          target="googleFormTarget"
        >
          <div class="form-field">
            <label for="contactName">&#12362;&#21517;&#21069;</label>
            <input id="contactName" name="contactName" type="text" autocomplete="name" required>
          </div>
          <div class="form-field">
            <label for="contactEmail">&#12513;&#12540;&#12523;&#12450;&#12489;&#12524;&#12473;</label>
            <input id="contactEmail" name="entry.1848378054" type="email" autocomplete="email" required>
          </div>
          <div class="form-field">
            <label for="contactMessage">&#12362;&#21839;&#12356;&#21512;&#12431;&#12379;&#20869;&#23481;</label>
            <textarea id="contactMessage" name="contactMessage" required></textarea>
          </div>
          <input type="hidden" id="googleMessage" name="entry.1272481879">
          <div class="form-actions">
            <a href="./index.html#contact">Back</a>
            <button type="submit">Send</button>
          </div>
          <p class="form-status" aria-live="polite"></p>
        </form>
        <iframe class="form-target" name="googleFormTarget" title="Google form submission"></iframe>
      </section>
    </main>

    <footer class="site-footer">
      <small data-copyright-year="2026">Copyright 2026 Nogime togo</small>
    </footer>

    <script>
      const primaryNav = document.querySelector(".primary-nav");
      const menuButton = document.querySelector(".menu-button");

      menuButton.addEventListener("click", () => {
        const open = !primaryNav.classList.contains("is-open");
        primaryNav.classList.toggle("is-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
      });

      const form = document.querySelector("#contactForm");
      const status = document.querySelector(".form-status");
      const submitButton = form.querySelector("button[type='submit']");

      form.addEventListener("submit", () => {
        const name = document.querySelector("#contactName").value.trim();
        const email = document.querySelector("#contactEmail").value.trim();
        const message = document.querySelector("#contactMessage").value.trim();
        document.querySelector("#googleMessage").value = [
          "Nogime togo website contact",
          "",
          `\u304a\u540d\u524d: ${name}`,
          `\u30e1\u30fc\u30eb\u30a2\u30c9\u30ec\u30b9: ${email}`,
          "",
          "\u304a\u554f\u3044\u5408\u308f\u305b\u5185\u5bb9:",
          message
        ].join("\n");

        submitButton.disabled = true;
        status.textContent = "Sending...";

        window.setTimeout(() => {
          form.reset();
          submitButton.disabled = false;
          status.textContent = "\u9001\u4fe1\u3057\u307e\u3057\u305f\u3002\u3042\u308a\u304c\u3068\u3046\u3054\u3056\u3044\u307e\u3059\u3002";
        }, 1200);
      });
    </script>
  </body>
</html>
