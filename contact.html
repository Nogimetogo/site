<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Nogime togo</title>
    <meta name="description" content="Nogime togo contact form.">
    <link rel="stylesheet" href="./styles.css?v=20260517-photoadd">
  </head>
  <body class="contact-page">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="./index.html#top" aria-label="Nogime togo home">Nogime togo</a>
        <p class="brand-tagline">Draw | Build | Place<br>Works in Architecture &amp; Photography</p>
      </div>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav">MENU</button>
      <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
        <a href="./index.html#gallery">PICK UP</a>
        <a href="./index.html#profile">PROFILE</a>
        <a href="./index.html#news">NEWS</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </header>

    <main>
      <section class="section contact-form-section">
        <div class="section-heading">
          <h1>CONTACT</h1>
        </div>
        <form class="contact-form" id="contactForm" action="mailto:nagominarim3@gmail.com" method="post" enctype="text/plain">
          <div class="form-field">
            <label for="name">お名前</label>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </div>
          <div class="form-field">
            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="form-field">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <div class="form-actions">
            <a href="./index.html#contact">Back</a>
            <button type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <small data-copyright-year="2026">Copyright 2026 Nogime togo</small>
    </footer>

    <script>
      const primaryNav = document.querySelector(".primary-nav");
      const menuButton = document.querySelector(".menu-button");

      menuButton.addEventListener("click", () => {
        const open = !primaryNav.classList.contains("is-open");
        primaryNav.classList.toggle("is-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
      });

      document.querySelector("#contactForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(event.currentTarget);
        const name = data.get("name");
        const email = data.get("email");
        const message = data.get("message");
        const subject = "Website contact from nogimetogo.com";
        const body = [
          "Nogime togo website contact",
          "",
          `お名前: ${name}`,
          `メールアドレス: ${email}`,
          "",
          "お問い合わせ内容:",
          message
        ].join("\n");

        window.location.href = `mailto:nagominarim3@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      });
    </script>
  </body>
</html>
