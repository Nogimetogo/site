<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Architecture | Nogime togo</title>
    <meta name="description" content="Nogime togoのArchitectureプロジェクトページ。">
    <link rel="stylesheet" href="../styles.css?v=20260517-photoadd">
  </head>
  <body class="project-page" data-return-url="../index.html?category=Architecture#gallery">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="../index.html#top">Nogime togo</a>
        <p class="brand-tagline">Draw | Build | Place<br>Works in Architecture &amp; Photography</p>
      </div>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav">MENU</button>
      <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
        <a href="../index.html?category=Architecture#gallery">PICK UP</a>
        <a href="../index.html#profile">PROFILE</a>
        <a href="../index.html#news">NEWS</a>
        <a href="../contact.html">CONTACT</a>
      </nav>
    </header>

    <main class="project-main">
      <article class="project-hero">
        <div class="project-meta reveal">
          <p class="project-kicker">Architecture / <span data-project-year></span></p>
          <h1 class="project-title" data-project-title></h1>
          <div class="project-summary" data-project-summary></div>
        </div>

        <div class="project-images" data-project-images aria-label="Project images"></div>
      </article>
    </main>

    <div class="project-return">Click anywhere to return</div>

    <script src="../data/architecture-projects.js?v=20260524-five-sync"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const project = (window.architectureProjects || []).find((item) => item.slug === slug) || window.architectureProjects?.[0];

      function assetUrl(path) {
        if (!path) return "";
        if (/^(https?:|data:|\.\/|\.\.\/|\/)/.test(path)) return path;
        return `../${path}`;
      }

      if (project) {
        document.title = `${project.title} | Nogime togo`;
        document.querySelector("[data-project-year]").textContent = project.year;
        document.querySelector("[data-project-title]").textContent = project.title;
        document.querySelector("[data-project-images]").setAttribute("aria-label", `${project.title} images`);

        const summary = document.querySelector("[data-project-summary]");
        project.summary.forEach((text) => {
          const paragraph = document.createElement("p");
          paragraph.textContent = text.replace(/\\*\\*/g, "");
          summary.append(paragraph);
        });

        const images = document.querySelector("[data-project-images]");
        project.images.forEach((image, index) => {
          const figure = document.createElement("figure");
          figure.className = "reveal";
          const img = document.createElement("img");
          img.src = assetUrl(image);
          img.alt = `${project.title} image ${index + 1}`;
          figure.append(img);
          const captionText = project.imageCaptions?.[index];
          if (captionText) {
            const caption = document.createElement("figcaption");
            caption.textContent = captionText;
            figure.append(caption);
          }
          images.append(figure);
        });
      }

      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { rootMargin: "0px 0px -12% 0px", threshold: 0.12 }
      );

      document.documentElement.classList.add("reveal-ready");
      document.querySelectorAll(".reveal").forEach((item) => revealObserver.observe(item));

      const primaryNav = document.querySelector(".primary-nav");
      const menuButton = document.querySelector(".menu-button");

      menuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        const open = !primaryNav.classList.contains("is-open");
        primaryNav.classList.toggle("is-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("a")) return;
        if (event.target.closest("button")) return;
        window.location.href = document.body.dataset.returnUrl;
      });
    </script>
  </body>
</html>
