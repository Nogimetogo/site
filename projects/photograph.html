<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photograph | Nogime togo</title>
    <meta name="description" content="Nogime togoのPhotographコンセプトページ。">
    <link rel="stylesheet" href="../styles.css?v=20260517-contact">
  </head>
  <body class="project-page photograph-page" data-return-url="../index.html?category=Photograph#gallery">
    <header class="site-header">
      <div class="brand-block">
        <a class="brand" href="../index.html#top">Nogime togo</a>
        <p class="brand-tagline">Draw | Build | Place<br>Works in Architecture &amp; Photography</p>
      </div>
      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav">MENU</button>
      <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
        <a href="../index.html?category=Photograph#gallery">PICK UP</a>
        <a href="../index.html#profile">PROFILE</a>
        <a href="../index.html#news">NEWS</a>
        <a href="../contact.html">CONTACT</a>
      </nav>
    </header>

    <main class="project-main">
      <article class="photograph-detail">
        <div class="photograph-heading reveal">
          <p class="project-kicker">Photograph / <span data-project-year></span></p>
          <h1 class="project-title" data-project-title></h1>
        </div>

        <div class="photograph-images" data-project-images aria-label="Photograph concept images"></div>
      </article>
    </main>

    <a class="project-close" href="../index.html?category=Photograph#gallery">close</a>

    <script src="../data/photograph-projects.js?v=20260517"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const project = (window.photographProjects || []).find((item) => item.slug === slug) || window.photographProjects?.[0];
      let currentImage = 0;
      let imageLocked = false;

      function assetUrl(path) {
        if (!path) return "";
        if (/^(https?:|data:|\.\/|\.\.\/|\/)/.test(path)) return path;
        return `../${path}`;
      }

      if (project) {
        document.title = `${project.title} | Nogime togo`;
        document.querySelector("[data-project-year]").textContent = project.year;
        document.querySelector("[data-project-title]").textContent = project.title;
        document.querySelector("[data-project-images]").setAttribute("aria-label", `${project.title} images`);

        const images = document.querySelector("[data-project-images]");
        project.images.forEach((image, index) => {
          const figure = document.createElement("figure");
          figure.className = `photograph-frame${index === 0 ? " is-active" : ""}`;
          const img = document.createElement("img");
          img.src = assetUrl(image);
          img.alt = `${project.title} image ${index + 1}`;
          figure.append(img);
          images.append(figure);
        });
      }

      document.documentElement.classList.add("reveal-ready");
      document.querySelector(".photograph-heading").classList.add("is-visible");

      function showImage(index) {
        const frames = [...document.querySelectorAll(".photograph-frame")];
        if (!frames.length) return;
        frames[currentImage].classList.remove("is-active");
        currentImage = (index + frames.length) % frames.length;
        frames[currentImage].classList.add("is-active");
      }

      function showNextImage() {
        if (imageLocked) return;
        imageLocked = true;
        showImage(currentImage + 1);
        window.setTimeout(() => {
          imageLocked = false;
        }, 760);
      }

      function showPreviousImage() {
        if (imageLocked) return;
        imageLocked = true;
        showImage(currentImage - 1);
        window.setTimeout(() => {
          imageLocked = false;
        }, 760);
      }

      window.addEventListener("wheel", (event) => {
        event.preventDefault();
        if (event.deltaY > 8 || event.deltaX > 8) {
          showNextImage();
        } else if (event.deltaY < -8 || event.deltaX < -8) {
          showPreviousImage();
        }
      }, { passive: false });

      let touchStartX = 0;
      let touchStartY = 0;

      window.addEventListener("touchstart", (event) => {
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
      }, { passive: true });

      window.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = Math.abs(touch.clientX - touchStartX);
        const dy = Math.abs(touch.clientY - touchStartY);
        if (dx > 16 || dy > 16) {
          showNextImage();
        }
      }, { passive: true });

      const primaryNav = document.querySelector(".primary-nav");
      const menuButton = document.querySelector(".menu-button");

      menuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        const open = !primaryNav.classList.contains("is-open");
        primaryNav.classList.toggle("is-open", open);
        menuButton.setAttribute("aria-expanded", String(open));
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("a")) return;
        if (event.target.closest("button")) return;
        if (event.target.closest(".photograph-images")) {
          showNextImage();
          return;
        }
        window.location.href = document.body.dataset.returnUrl;
      });
    </script>
  </body>
</html>
